<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>404 Page Not Found</title>

<style>
body{
    margin:0;
    padding:0;
    font-family: Arial, sans-serif;
    background:#f2f2f2;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    text-align:center;
}

h1{
    font-size:80px;
    color:#ff4d4d;
    margin:0;
}

h2{
    margin:10px 0;
}

p{
    color:#555;
}

a{
    display:inline-block;
    margin-top:20px;
    padding:10px 20px;
    background:#007bff;
    color:white;
    text-decoration:none;
    border-radius:5px;
}

a:hover{
    background:#0056b3;
}
</style>

</head>
<body>

<div class="container">
<h1>404</h1>
<h2>Page Not Found</h2>
<p>Sorry, the page you are looking for does not exist.</p>

<a href="/">Go Back Home</a>
</div>

</body>
</html>
